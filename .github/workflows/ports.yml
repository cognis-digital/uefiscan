name: ports
on: [push, pull_request]
permissions:
  contents: read
jobs:
  go:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ports/go
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"
      - run: go vet ./...
      - run: go test -v ./...
      - run: go build -o /tmp/uefiscan-go .

  rust:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ports/rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --release
      - run: cargo test

  javascript:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ports/javascript
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: node --test

  shell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - run: shellcheck ports/shell/uefiscan.sh || true
      - name: test
        run: bash ports/shell/test.sh
