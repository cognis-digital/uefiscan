apiVersion: apps/v1
kind: Deployment
metadata: { name: uefiscan, labels: { app: uefiscan } }
spec:
  replicas: 1
  selector: { matchLabels: { app: uefiscan } }
  template:
    metadata: { labels: { app: uefiscan } }
    spec:
      containers:
        - name: uefiscan
          image: ghcr.io/cognis-digital/uefiscan:latest
          ports: [{ containerPort: 8000 }]
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits: { cpu: "500m", memory: "256Mi" }
---
apiVersion: v1
kind: Service
metadata: { name: uefiscan }
spec:
  selector: { app: uefiscan }
  ports: [{ port: 80, targetPort: 8000 }]
